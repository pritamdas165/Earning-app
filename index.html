<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rewarder Pro Max - 100% Login Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    
    <!-- Console for Mobile (Eruda) -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <style>
        :root { --bg: #020617; --accent: #6366f1; --gold: #f59e0b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: white; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-gold { background: linear-gradient(135deg, #f59e0b 0%, #ea580c 100%); box-shadow: 0 4px 15px rgba(234, 88, 12, 0.3); }
        .nav-active { color: #6366f1; transform: translateY(-3px); }
        #wheel { transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        .payout-ticker { animation: slideLeft 20s linear infinite; white-space: nowrap; }
        @keyframes slideLeft { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body class="min-h-screen">

    <!-- Splash/Login Screen -->
    <div id="splash" class="fixed inset-0 z-[1000] bg-slate-950 flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="relative w-24 h-24 mb-6">
            <div class="absolute inset-0 bg-indigo-600 rounded-full blur-2xl opacity-40 animate-pulse"></div>
            <i class="fas fa-shield-halved text-indigo-500 text-6xl relative"></i>
        </div>
        <h1 class="text-3xl font-black tracking-tighter uppercase italic text-white text-center">Rewarder <br><span class="text-indigo-500">Pro Max</span></h1>
        
        <div id="auth-controls" class="mt-12 w-full max-w-xs px-6 hidden">
            <button id="google-login-btn" onclick="loginWithGoogle()" class="w-full bg-white text-black py-4 rounded-2xl font-bold flex items-center justify-center space-x-3 active:scale-95 transition-all shadow-xl">
                <i class="fab fa-google text-red-500 text-xl"></i>
                <span>Sign in with Google</span>
            </button>
            <p id="login-status" class="text-[10px] text-slate-500 text-center mt-4 uppercase tracking-widest font-bold">Secure Connection Required</p>
        </div>
    </div>

    <!-- App Container (Hidden until Auth) -->
    <div id="app" class="hidden flex-col w-full max-w-md mx-auto min-h-screen pb-28 pt-8">
        <header class="p-6 flex justify-between items-center sticky top-0 z-50 bg-slate-950/90 backdrop-blur-xl">
            <div class="flex items-center space-x-3">
                <img src="" id="user-avatar" class="w-11 h-11 rounded-2xl bg-slate-800 p-1 border border-white/10">
                <div>
                    <h3 class="text-sm font-black tracking-tight" id="disp-name">User</h3>
                    <p class="text-[9px] text-indigo-400 font-bold uppercase">Lvl <span id="lvl">1</span></p>
                </div>
            </div>
            <div class="bg-indigo-600/10 px-4 py-1.5 rounded-full border border-indigo-500/20 flex items-center space-x-2">
                <i class="fas fa-coins text-gold text-xs"></i>
                <span id="balance" class="font-black text-white text-xs">0</span>
            </div>
        </header>

        <div id="content-area" class="px-6 space-y-6 pt-2">
            <!-- Home View -->
            <div id="view-home" class="view space-y-6">
                <div class="glass p-6 rounded-[2.5rem] bg-gradient-to-br from-indigo-500/20 to-transparent flex justify-between items-center border-l-4 border-indigo-500">
                    <div>
                        <h2 class="text-lg font-black uppercase italic">Daily Bonus</h2>
                        <p class="text-[10px] text-slate-400">Claim 50 Coins</p>
                    </div>
                    <button id="daily-claim-btn" class="btn-gold px-6 py-2 rounded-xl text-[10px] font-black uppercase">Claim</button>
                </div>
                <div id="task-list" class="space-y-4"></div>
            </div>

            <!-- Wallet View -->
            <div id="view-wallet" class="view hidden space-y-6">
                <div class="glass p-10 rounded-[3rem] text-center shadow-2xl">
                    <p class="text-slate-500 text-[10px] font-bold mb-2">WALLET BALANCE</p>
                    <h2 class="text-6xl font-black">₹<span id="cash">0.00</span></h2>
                    <button onclick="showToast('Minimum Withdrawal ₹20')" class="w-full mt-8 py-5 rounded-[2rem] bg-slate-800 text-slate-500 font-black text-sm uppercase">Withdraw</button>
                </div>
            </div>
        </div>

        <!-- Navigation Bar -->
        <nav class="fixed bottom-6 left-6 right-6 h-20 glass rounded-[2.5rem] flex items-center justify-around px-2 z-50 shadow-2xl">
            <button onclick="showView('home')" class="nav-btn nav-active flex flex-col items-center flex-1">
                <i class="fas fa-bolt-lightning text-xl"></i>
                <span class="text-[8px] font-black mt-1 uppercase">Earn</span>
            </button>
            <button onclick="showView('wallet')" class="nav-btn text-slate-500 flex flex-col items-center flex-1">
                <i class="fas fa-wallet text-xl"></i>
                <span class="text-[8px] font-black mt-1 uppercase">Wallet</span>
            </button>
        </nav>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-12 left-1/2 -translate-x-1/2 z-[3000] px-8 py-3 rounded-full bg-indigo-600 text-white font-black text-[10px] shadow-2xl opacity-0 transition-all uppercase pointer-events-none">Success!</div>

    <script>
        // --- 1. FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyAOFz5xOx7rsWi7lO8PfIGrsYmd8P_PgyI",
            authDomain: "earing-app-7fc63.firebaseapp.com",
            projectId: "earing-app-7fc63",
            storageBucket: "earing-app-7fc63.firebasestorage.app",
            messagingSenderId: "349568808549",
            appId: "1:349568808549:web:a32dddb6f622924f62788c"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let userData = { coins: 0, lvl: 1, doneTasks: [] };

        // --- 2. AUTH LOGIC (MODIFIED FOR MOBILE REDIRECT) ---
        async function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            const btn = document.getElementById('google-login-btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>Connecting...</span>';
            
            try {
                // signInWithRedirect works much better on mobile browsers
                await auth.signInWithRedirect(provider);
            } catch (e) {
                console.error("Login Error:", e);
                showToast("Login Failed: " + e.message, "err");
                btn.innerHTML = '<i class="fab fa-google text-red-500 text-xl"></i> <span>Sign in with Google</span>';
            }
        }

        // Handle the redirect result when user comes back to the app
        auth.getRedirectResult().then((result) => {
            if (result.user) {
                console.log("Logged in after redirect:", result.user.displayName);
            }
        }).catch((error) => {
            console.error("Redirect Error:", error);
        });

        // Listen for Auth State Changes
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('login-status').innerText = "Account Verified. Loading Data...";
                
                try {
                    const userRef = db.collection('users').doc(user.uid);
                    const doc = await userRef.get();
                    
                    if (!doc.exists) {
                        // Create New Profile
                        const initialData = {
                            uid: user.uid,
                            displayName: user.displayName,
                            photoURL: user.photoURL,
                            coins: 0,
                            lvl: 1,
                            doneTasks: [],
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        };
                        await userRef.set(initialData);
                        initApp(initialData);
                    } else {
                        initApp(doc.data());
                    }
                } catch (err) {
                    console.error("Firestore Error:", err);
                    showToast("Database Access Denied!", "err");
                }
            } else {
                document.getElementById('auth-controls').classList.remove('hidden');
            }
        });

        // --- 3. APP INITIALIZATION ---
        function initApp(data) {
            userData = data;
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').remove();
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('app').classList.add('flex');
                
                // Update UI Header
                document.getElementById('disp-name').innerText = userData.displayName;
                document.getElementById('user-avatar').src = userData.photoURL;
                
                // Live Data Sync
                db.collection('users').doc(currentUser.uid).onSnapshot(doc => {
                    if (doc.exists) {
                        userData = doc.data();
                        updateUI();
                    }
                });
                renderTasks();
            }, 700);
        }

        function updateUI() {
            document.getElementById('balance').innerText = userData.coins;
            document.getElementById('cash').innerText = (userData.coins / 100).toFixed(2);
            document.getElementById('lvl').innerText = userData.lvl;
        }

        function renderTasks() {
            const container = document.getElementById('task-list');
            let tasks = '';
            for(let i=1; i<=5; i++) {
                if(!userData.doneTasks.includes(i)) {
                    tasks += `
                    <div class="glass p-4 rounded-2xl flex items-center justify-between border-l-4 border-l-indigo-500">
                        <div>
                            <h4 class="text-xs font-black tracking-tight italic uppercase">Elite Task #${i}</h4>
                            <p class="text-[9px] text-indigo-400 font-bold uppercase">+15 COINS</p>
                        </div>
                        <button onclick="completeTask(${i}, 15)" class="bg-indigo-600 px-5 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest active:scale-90 transition-all">Start</button>
                    </div>`;
                }
            }
            container.innerHTML = tasks || '<p class="text-center text-slate-600 text-[10px] py-10 uppercase font-black">All Tasks Completed!</p>';
        }

        async function completeTask(id, reward) {
            showToast("Verifying Task...");
            setTimeout(async () => {
                await db.collection('users').doc(currentUser.uid).update({
                    coins: firebase.firestore.FieldValue.increment(reward),
                    doneTasks: firebase.firestore.FieldValue.arrayUnion(id)
                });
                showToast(`+${reward} COINS ADDED!`);
                renderTasks();
            }, 1500);
        }

        function showView(v) {
            document.querySelectorAll('.view').forEach(view => view.classList.add('hidden'));
            document.getElementById('view-' + v).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('nav-active', 'text-slate-500'));
            event.currentTarget.classList.replace('text-slate-500', 'nav-active');
        }

        function showToast(msg, type="success") {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.backgroundColor = type === "success" ? "#4f46e5" : "#ef4444";
            t.style.opacity = "1"; t.style.top = "60px";
            setTimeout(() => { t.style.opacity = "0"; t.style.top = "10px"; }, 2500);
        }
    </script>
</body>
</html>
